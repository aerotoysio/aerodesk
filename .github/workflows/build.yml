name: build

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x
      - name: Build
        run: dotnet build AeroDesk.sln -c Release
      - name: Test
        run: dotnet test tests/AeroDesk.Core.Tests/AeroDesk.Core.Tests.csproj -c Release --no-build
